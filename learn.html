<style>
  :root{
    --bg:#F0F4F8; --card:#ffffff; --accent:#1565C0; --accent2:#2E7D32;
    --text:#1E293B; --sub:#607D8B; --border:#CBD5E1;
  }
  :root[data-theme="dark"]{
    --bg:#0F172A; --card:#1E293B; --accent:#60A5FA; --accent2:#4ADE80;
    --text:#E2E8F0; --sub:#94A3B8; --border:#334155;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--text); transition:background-color .2s, color .2s;
  }
  .top-fixed{
    position:sticky; top:0; z-index:100; background:var(--bg);
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  header{
    background:linear-gradient(120deg,#0A3D91 0%,#1565C0 55%,#0B4AA8 100%);
    color:#fff; padding:0 20px; position:relative; overflow:hidden;
  }
  header::before{
    content:''; position:absolute; inset:0; pointer-events:none;
    background-image:
      linear-gradient(115deg, rgba(255,255,255,.08) 0%, transparent 30%),
      repeating-linear-gradient(58deg, rgba(255,255,255,.05) 0 30px, transparent 30px 70px),
      repeating-linear-gradient(-32deg, rgba(255,255,255,.04) 0 26px, transparent 26px 64px);
  }
  .header-inner{
    max-width:1000px; margin:0 auto; position:relative; z-index:1;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; gap:14px; flex-wrap:wrap;
  }
  .brand{ display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .brand-tagline{ font-size:.74rem; font-weight:700; opacity:.85; letter-spacing:.2px; }
  .brand-title-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .brand-main{ font-size:1.4rem; font-weight:900; letter-spacing:-.5px; line-height:1.15; }
  .brand-main-en{ font-size:1.05rem; font-weight:800; opacity:.92; }
  .brand-bubble{
    display:inline-flex; align-items:center; gap:5px;
    background:rgba(255,255,255,.95); color:#0A3D91;
    border-radius:20px; padding:5px 13px 5px 9px; font-size:.78rem; font-weight:800;
    white-space:nowrap; box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .brand-bubble svg{ width:16px; height:16px; flex-shrink:0; }
  .header-right{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .profile-bar{ display:flex; align-items:center; gap:8px; font-size:.88rem; }
  .profile-bar .avatar{ width:24px; height:24px; display:inline-flex; background:#fff; border-radius:50%; padding:2px; }
  .profile-bar .avatar svg{ width:20px; height:20px; }
  .logout-btn{
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.45); color:#fff;
    border-radius:12px; padding:5px 11px; font-size:.74rem; cursor:pointer; white-space:nowrap;
  }
  .theme-toggle-btn{
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.45); color:#fff;
    width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:.9rem;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .controls{
    max-width:900px; margin:16px auto 0; padding:0 16px;
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between;
  }
  .top-fixed .controls:last-of-type{margin-bottom:16px;}
  .chapter-select{display:flex; flex-wrap:wrap; gap:6px; max-width:100%;}
  .chapter-btn{
    border:1px solid var(--border); background:var(--card); color:var(--text);
    border-radius:20px; padding:6px 12px; font-size:.85rem; cursor:pointer;
  }
  .chapter-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .toggle-group{display:flex; gap:8px;}
  .toggle-btn{
    border:1px solid var(--accent); background:var(--card); color:var(--accent);
    border-radius:8px; padding:8px 14px; font-size:.85rem; cursor:pointer; white-space:nowrap;
  }
  .toggle-btn.on{background:var(--accent); color:#fff;}
  main{max-width:900px; margin:0 auto; padding:16px;}
  .chapter-title{
    font-size:1.1rem; font-weight:700; margin:24px 0 10px; color:var(--accent2);
    border-bottom:2px solid var(--accent2); padding-bottom:6px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .chapter-title .title-text{flex:1; min-width:0;}
  .chapter-repeat-btn{
    flex:0 0 auto; border:1.5px solid var(--accent); background:var(--card); color:var(--accent);
    border-radius:20px; padding:6px 12px; font-size:.78rem; font-weight:700; cursor:pointer;
    white-space:nowrap;
  }
  .chapter-repeat-btn.on{background:#c1121f; color:#fff; border-color:#c1121f;}
  .chapter-title .toggle-btn{
    padding:5px 10px; font-size:.78rem; border-radius:16px;
  }
  .sentence-card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px;
  }
  .sentence-num{
    flex:0 0 28px; color:var(--sub); font-size:.8rem; text-align:right;
  }
  .sentence-body{flex:1; min-width:0;}
  .en{font-size:1.02rem; font-weight:600;}
  .ko{font-size:.92rem; color:var(--sub); margin-top:4px; transition:filter .15s, opacity .15s;}
  .ko.hidden{filter:blur(6px); opacity:.6; cursor:pointer; user-select:none;}
  .btn-group{display:flex; gap:6px; flex:0 0 auto;}
  .speak-btn{
    flex:0 0 auto; border:none; background:var(--accent); color:#fff;
    width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .speak-btn:active{transform:scale(0.92);}
  .repeat-btn{
    flex:0 0 auto; border:none; background:var(--card); color:var(--accent);
    border:1.5px solid var(--accent);
    width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .repeat-btn.on{background:var(--accent2); color:#fff; border-color:var(--accent2);}
  .repeat-btn:active{transform:scale(0.92);}
  .memo-btn{
    flex:0 0 auto; border:1.5px solid #adb5bd; background:var(--card); color:#adb5bd;
    width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem;
  }
  .memo-btn.memorized{background:#2ec4b6; color:#fff; border-color:#2ec4b6;}
  .memo-btn:active{transform:scale(0.92);}
  .sentence-card.memorized{opacity:.55;}
  .record-btn{
    flex:0 0 auto; border:none; background:#ff6b6b; color:#fff;
    width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .record-btn.recording{background:#c1121f; animation:pulse 1s infinite;}
  .record-btn:active{transform:scale(0.92);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(193,18,31,.5);}
    70%{box-shadow:0 0 0 8px rgba(193,18,31,0);}
    100%{box-shadow:0 0 0 0 rgba(193,18,31,0);}
  }
  .score-badge{
    flex:0 0 auto; font-size:.8rem; font-weight:700; padding:4px 8px;
    border-radius:10px; white-space:nowrap; min-width:38px; text-align:center;
  }
  .score-badge.high{background:#d3f9d8; color:#2b8a3e;}
  .score-badge.mid{background:#fff3bf; color:#e67700;}
  .score-badge.low{background:#ffe3e3; color:#c92a2a;}
  footer{text-align:center; color:var(--sub); font-size:.8rem; padding:24px 16px;}
  @media (max-width:600px){
    header{padding:0 12px;}
    .header-inner{padding:8px 0; gap:8px;}
    .brand-tagline{font-size:.62rem;}
    .brand-title-row{gap:6px;}
    .brand-main{font-size:1.05rem;}
    .brand-main-en{font-size:.8rem;}
    .brand-bubble{font-size:.65rem; padding:3px 9px 3px 7px;}
    .brand-bubble svg{width:13px; height:13px;}
    .profile-bar{font-size:.74rem; gap:6px;}
    .profile-bar .avatar{width:18px; height:18px;}
    .profile-bar .avatar svg{width:14px; height:14px;}
    .logout-btn{padding:3px 8px; font-size:.62rem;}
    .controls{margin-top:8px; padding:0 10px; gap:6px;}
    .top-fixed .controls:last-of-type{margin-bottom:8px;}
    .toggle-btn{padding:6px 10px; font-size:.75rem;}
    #stageSelect, #chapterSelect{
      flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch;
      padding-bottom:4px; scrollbar-width:thin;
    }
    #stageSelect .chapter-btn, #chapterSelect .chapter-btn{
      flex:0 0 auto; padding:5px 10px; font-size:.78rem;
    }
    main{padding:10px;}
    .chapter-title{font-size:1rem; margin:16px 0 8px;}
    .sentence-card{padding:10px 12px; gap:8px;}
  }
  @media (max-width:480px){
    .en{font-size:.95rem;}
    .ko{font-size:.85rem;}
  }
</style>
</head>

const stages = {1: stage1, 2: stage2, 3: stage3, 4: stage4, 5: stage5, 6: stage6};

const stageSelect = document.getElementById('stageSelect');
const chapterSelect = document.getElementById('chapterSelect');
const mainEl = document.getElementById('main');
const toggleKoBtn = document.getElementById('toggleKo');
const toggleUnmemorizedBtn = document.getElementById('toggleUnmemorized');

let koHidden = true;
let showOnlyUnmemorized = false;
let currentStage = 1;
let currentChapter = 1;

const MEMO_KEY = 'memorized-sentences';
let memorized = {};
try{ memorized = JSON.parse(localStorage.getItem(MEMO_KEY)) || {}; }catch(e){ memorized = {}; }

function memoId(stage, ch, idx){ return stage + '-' + ch + '-' + idx; }
function isMemorized(stage, ch, idx){ return !!memorized[memoId(stage, ch, idx)]; }
function setMemorized(stage, ch, idx, val){
  const id = memoId(stage, ch, idx);
  if(val) memorized[id] = true; else delete memorized[id];
  localStorage.setItem(MEMO_KEY, JSON.stringify(memorized));
}

function buildStageButtons(){
  stageSelect.innerHTML = '';
  Object.keys(stages).map(Number).sort((a,b)=>a-b).forEach(stageNum=>{
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (stageNum===currentStage ? ' active':'');
    btn.textContent = stageNum + '단계';
    btn.onclick = ()=>{
      currentStage = stageNum;
      currentChapter = stages[currentStage][0].ch;
      buildStageButtons();
      buildChapterButtons();
      render();
    };
    stageSelect.appendChild(btn);
  });
}

function buildChapterButtons(){
  chapterSelect.innerHTML = '';
  stages[currentStage].forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (c.ch===currentChapter ? ' active':'');
    btn.textContent = c.ch + '화';
    btn.onclick = ()=>{
      currentChapter = c.ch;
      render();
    };
    chapterSelect.appendChild(btn);
  });
}

let repeatTimer = null;
let activeRepeatBtn = null;

function stopRepeat(){
  if(repeatTimer){ clearTimeout(repeatTimer); repeatTimer = null; }
  if(activeRepeatBtn){ activeRepeatBtn.classList.remove('on'); activeRepeatBtn = null; }
  window.speechSynthesis.cancel();
}

function speak(text, onend){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.95;
  if(onend) u.onend = onend;
  window.speechSynthesis.speak(u);
}

function toggleRepeat(text, btn){
  if(activeRepeatBtn === btn){
    stopRepeat();
    return;
  }
  stopRepeat();
  activeRepeatBtn = btn;
  btn.classList.add('on');
  const loop = ()=>{
    if(activeRepeatBtn !== btn) return;
    speak(text, ()=>{
      if(activeRepeatBtn !== btn) return;
      repeatTimer = setTimeout(loop, 800);
    });
  };
  loop();
}

const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let activeRecordBtn = null;
let activeRecognition = null;

function normalizeText(t){
  return t.toLowerCase().replace(/[^a-z0-9' ]/g,'').replace(/\s+/g,' ').trim();
}

function levenshtein(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, ()=> new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0] = i;
  for(let j=0;j<=n;j++) dp[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1]===b[j-1]) dp[i][j] = dp[i-1][j-1];
      else dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function scoreSentence(target, heard){
  const t = normalizeText(target);
  const h = normalizeText(heard);
  if(!h) return 0;
  const dist = levenshtein(t, h);
  const maxLen = Math.max(t.length, h.length, 1);
  const score = Math.round((1 - dist/maxLen) * 100);
  return Math.max(0, Math.min(100, score));
}

function setScoreBadge(badge, score){
  badge.textContent = score + '%';
  badge.classList.remove('high','mid','low');
  badge.classList.add(score >= 80 ? 'high' : score >= 50 ? 'mid' : 'low');
  badge.style.display = 'inline-block';
}

function stopRecording(){
  if(activeRecognition){
    try{ activeRecognition.stop(); }catch(e){}
  }
  if(activeRecordBtn){ activeRecordBtn.classList.remove('recording'); activeRecordBtn = null; }
  activeRecognition = null;
}

function toggleRecording(en, btn, badge){
  if(!SpeechRecognitionAPI){
    alert('이 브라우저는 음성 인식을 지원하지 않습니다. 크롬 브라우저를 사용해 주세요.');
    return;
  }
  if(activeRecordBtn === btn){
    stopRecording();
    return;
  }
  stopRecording();
  stopRepeat();
  window.speechSynthesis.cancel();

  const recognition = new SpeechRecognitionAPI();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  activeRecognition = recognition;
  activeRecordBtn = btn;
  btn.classList.add('recording');
  badge.style.display = 'none';

  recognition.onresult = (e)=>{
    const heard = e.results[0][0].transcript;
    const score = scoreSentence(en, heard);
    setScoreBadge(badge, score);
  };
  recognition.onerror = ()=>{
    badge.textContent = '오류';
    badge.classList.remove('high','mid','low');
    badge.classList.add('low');
    badge.style.display = 'inline-block';
  };
  recognition.onend = ()=>{
    btn.classList.remove('recording');
    if(activeRecordBtn === btn){ activeRecordBtn = null; activeRecognition = null; }
  };

  recognition.start();
}

let chapterPlaybackActive = false;
let chapterPlaybackToken = 0;

function stopChapterPlayback(btn){
  chapterPlaybackActive = false;
  window.speechSynthesis.cancel();
  if(btn){
    btn.classList.remove('on');
    btn.textContent = '🔂 문장당 10회 듣기';
  }
}

function playChapterTenTimes(chapterObj, btn){
  if(chapterPlaybackActive){
    stopChapterPlayback(btn);
    return;
  }
  stopRepeat();
  stopRecording();
  chapterPlaybackActive = true;
  const myToken = ++chapterPlaybackToken;
  btn.classList.add('on');
  btn.textContent = '⏹ 중지';

  const sentences = chapterObj.sentences;
  let i = 0, count = 0;

  function playNext(){
    if(myToken !== chapterPlaybackToken || !chapterPlaybackActive) return;
    if(i >= sentences.length){
      stopChapterPlayback(btn);
      return;
    }
    const [en] = sentences[i];
    speak(en, ()=>{
      if(myToken !== chapterPlaybackToken || !chapterPlaybackActive) return;
      count++;
      if(count >= 10){
        count = 0;
        i++;
      }
      setTimeout(playNext, 500);
    });
  }
  playNext();
}

function renderChapter(c, stageNum){
  const title = document.createElement('div');
  title.className = 'chapter-title';

  const titleText = document.createElement('span');
  titleText.className = 'title-text';
  titleText.textContent = '🔹 ' + stageNum + '단계 ' + c.ch + '화';
  title.appendChild(titleText);

  const titleBtnGroup = document.createElement('div');
  titleBtnGroup.style.cssText = 'display:flex; gap:6px; align-items:center; flex-shrink:0;';
  titleBtnGroup.appendChild(toggleKoBtn);
  titleBtnGroup.appendChild(toggleUnmemorizedBtn);

  const chapterRepeatBtn = document.createElement('button');
  chapterRepeatBtn.className = 'chapter-repeat-btn';
  chapterRepeatBtn.textContent = '🔂 문장당 10회 듣기';
  chapterRepeatBtn.onclick = ()=> playChapterTenTimes(c, chapterRepeatBtn);
  titleBtnGroup.appendChild(chapterRepeatBtn);

  title.appendChild(titleBtnGroup);

  mainEl.appendChild(title);

  c.sentences.forEach((s, idx)=>{
    const [en, ko] = s;
    const memo = isMemorized(stageNum, c.ch, idx);
    if(showOnlyUnmemorized && memo) return;

    const card = document.createElement('div');
    card.className = 'sentence-card' + (memo ? ' memorized':'');

    const num = document.createElement('div');
    num.className = 'sentence-num';
    num.textContent = (idx+1);

    const body = document.createElement('div');
    body.className = 'sentence-body';
    const enDiv = document.createElement('div');
    enDiv.className = 'en';
    enDiv.textContent = en;
    const koDiv = document.createElement('div');
    koDiv.className = 'ko' + (koHidden ? ' hidden':'');
    koDiv.textContent = ko;
    koDiv.onclick = ()=> koDiv.classList.toggle('hidden');
    body.appendChild(enDiv);
    body.appendChild(koDiv);

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';

    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.innerHTML = ICON_SPEAK;
    speakBtn.onclick = ()=>{ stopRepeat(); speak(en); };

    const repeatBtn = document.createElement('button');
    repeatBtn.className = 'repeat-btn';
    repeatBtn.innerHTML = ICON_REPEAT;
    repeatBtn.onclick = ()=> toggleRepeat(en, repeatBtn);

    const memoBtn = document.createElement('button');
    memoBtn.className = 'memo-btn' + (memo ? ' memorized':'');
    memoBtn.textContent = memo ? '✅' : '⬜';
    memoBtn.title = '암기 여부 체크';
    memoBtn.onclick = ()=>{
      const newVal = !isMemorized(stageNum, c.ch, idx);
      setMemorized(stageNum, c.ch, idx, newVal);
      if(showOnlyUnmemorized && newVal){
        render();
      } else {
        card.classList.toggle('memorized', newVal);
        memoBtn.classList.toggle('memorized', newVal);
        memoBtn.textContent = newVal ? '✅' : '⬜';
      }
    };

    const recordBtn = document.createElement('button');
    recordBtn.className = 'record-btn';
    recordBtn.innerHTML = ICON_MIC;
    recordBtn.title = '발음 녹음 및 평가';

    const scoreBadge = document.createElement('div');
    scoreBadge.className = 'score-badge';
    scoreBadge.style.display = 'none';

    recordBtn.onclick = ()=> toggleRecording(en, recordBtn, scoreBadge);

    btnGroup.appendChild(speakBtn);
    btnGroup.appendChild(repeatBtn);
    btnGroup.appendChild(recordBtn);
    btnGroup.appendChild(scoreBadge);

    card.appendChild(memoBtn);
    card.appendChild(num);
    card.appendChild(body);
    card.appendChild(btnGroup);
    mainEl.appendChild(card);
  });
}

function render(){
  const pool = document.getElementById('togglePool');
  pool.appendChild(toggleKoBtn);
  pool.appendChild(toggleUnmemorizedBtn);
  mainEl.innerHTML = '';
  const chapters = stages[currentStage];
  Array.from(chapterSelect.children).forEach((b,i)=>{
    b.classList.toggle('active', chapters[i].ch === currentChapter);
  });

  const c = chapters.find(d=>d.ch===currentChapter);
  renderChapter(c, currentStage);
}

toggleKoBtn.onclick = ()=>{
  koHidden = !koHidden;
  toggleKoBtn.classList.toggle('on', !koHidden);
  toggleKoBtn.textContent = '해석보기';
  document.querySelectorAll('.ko').forEach(el=> el.classList.toggle('hidden', koHidden));
};

toggleUnmemorizedBtn.onclick = ()=>{
  showOnlyUnmemorized = !showOnlyUnmemorized;
  toggleUnmemorizedBtn.classList.toggle('on', showOnlyUnmemorized);
  toggleUnmemorizedBtn.textContent = '미암기만 보기';
  render();
};

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = 'inline-block';
});

installBtn.onclick = async ()=>{
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
};

window.addEventListener('appinstalled', ()=>{
  installBtn.style.display = 'none';
  deferredInstallPrompt = null;
});

const themeToggle = document.getElementById('themeToggle');
function updateThemeIcon(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeToggle.textContent = isDark ? '☀️' : '🌙';
}
themeToggle.onclick = ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('theme', next); }catch(e){}
  updateThemeIcon();
};
updateThemeIcon();
</script>
</body>
</html>
