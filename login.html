<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐릭터 설정 - 잉핏 EngFit</title>
<meta name="description" content="십이간지 캐릭터와 닉네임을 설정하고 잉핏(EngFit) 4단계 다이렉트 트레이닝을 시작하세요.">
<meta name="robots" content="noindex">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="google-adsense-account" content="ca-pub-3819932954579285">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3819932954579285" crossorigin="anonymous"></script>
<script>
  (function(){
    try{
      const saved = localStorage.getItem('theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }catch(e){}
  })();
</script>
<style>
  :root{
    --bg:#F0F4F8; --card:#ffffff; --accent:#1565C0; --accent2:#2E7D32;
    --text:#1E293B; --sub:#607D8B; --border:#CBD5E1;
  }
  :root[data-theme="dark"]{
    --bg:#0F172A; --card:#1E293B; --accent:#60A5FA; --accent2:#4ADE80;
    --text:#E2E8F0; --sub:#94A3B8; --border:#334155;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(150deg,var(--accent) 0%,#0D47A1 50%,var(--accent2) 100%);
    display:flex; align-items:center; justify-content:center; padding:16px;
    transition:background-color .2s, color .2s;
  }
  .theme-toggle{
    position:fixed; top:10px; right:10px; z-index:200;
    width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,.5);
    background:rgba(0,0,0,.25); color:#fff; font-size:1.1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .login-card{
    background:var(--card); border-radius:20px; padding:32px 24px;
    max-width:420px; width:100%; box-shadow:0 12px 30px rgba(0,0,0,.18);
  }
  .login-card h1{
    margin:0 0 4px; font-size:1.3rem; text-align:center; color:var(--accent2);
  }
  .login-card p.sub{
    margin:0 0 20px; text-align:center; color:var(--sub); font-size:.85rem;
  }
  label{display:block; font-size:.85rem; font-weight:700; color:var(--text); margin-bottom:8px;}
  .animal-grid{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px;
  }
  .animal-btn{
    background:var(--bg); border:2px solid var(--border); border-radius:14px;
    padding:8px 0 6px; cursor:pointer; transition:.15s;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .animal-btn svg{width:38px; height:38px;}
  .animal-btn .animal-name{font-size:.66rem; font-weight:700; color:var(--sub);}
  .animal-btn:hover{transform:translateY(-2px);}
  .animal-btn.selected{
    border-color:var(--accent); background:#E3F2FD;
    box-shadow:0 0 0 3px rgba(21,101,192,.25);
  }
  input[type="text"]{
    width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:12px;
    font-size:1rem; margin-bottom:8px; outline:none;
  }
  input[type="text"]:focus{border-color:var(--accent);}
  .hint{font-size:.78rem; color:var(--sub); margin-bottom:20px;}
  .preview{
    display:flex; align-items:center; gap:10px; justify-content:center;
    margin-bottom:20px; font-size:.95rem; color:var(--text);
  }
  .preview .avatar{width:44px; height:44px; display:inline-flex;}
  .preview .avatar svg{width:44px; height:44px;}
  .submit-btn{
    width:100%; padding:14px; border:none; border-radius:12px;
    background:var(--accent); color:#fff; font-size:1rem; font-weight:700; cursor:pointer;
  }
  .submit-btn:disabled{background:#adb5bd; cursor:not-allowed;}
  .submit-btn:active:not(:disabled){transform:scale(0.98);}
  .error{color:#c92a2a; font-size:.82rem; margin-bottom:10px; min-height:1em;}
</style>
</head>
<body>

<button id="themeToggle" class="theme-toggle" title="다크모드 전환">🌙</button>

<div class="login-card">
  <div style="text-align:center; margin-bottom:14px;">
    <span style="font-size:1.5rem; font-weight:900; color:var(--accent);">잉핏</span>
    <span style="font-size:1rem; font-weight:700; color:var(--accent2); margin-left:6px;">EngFit</span>
  </div>
  <h1 style="color:var(--accent);">4단계 다이렉트 트레이닝</h1>
  <p class="sub">나만의 캐릭터와 닉네임을 설정하고 시작해요!</p>

  <label>나의 십이간지 동물을 골라주세요</label>
  <div class="animal-grid" id="animalGrid"></div>

  <label for="nickname">닉네임</label>
  <input type="text" id="nickname" maxlength="12" placeholder="닉네임을 입력해 주세요 (최대 12자)">
  <div class="hint">예: 토끼순이, 멍멍이짱</div>

  <div class="preview" id="preview" style="display:none;">
    <span class="avatar" id="previewAvatar"></span>
    <span id="previewName"></span>
  </div>

  <div class="error" id="errorMsg"></div>

  <button class="submit-btn" id="submitBtn" disabled>시작하기</button>

  <div style="text-align:center; margin-top:16px;">
    <a href="index.html" style="color:var(--sub); font-size:.8rem; text-decoration:none;">← 학습법 소개 페이지로</a>
    <span style="color:var(--border); margin:0 4px;">|</span>
    <a href="privacy.html" style="color:var(--sub); font-size:.8rem; text-decoration:none;">개인정보처리방침</a>
  </div>
</div>

<script>
const ANIMAL_NAMES = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
const ANIMALS = [
  // 쥐
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="34" ry="30" fill="#B0B0B8"/><circle cx="20" cy="30" r="14" fill="#B0B0B8"/><circle cx="80" cy="30" r="14" fill="#B0B0B8"/><circle cx="20" cy="30" r="7" fill="#F4B6C2"/><circle cx="80" cy="30" r="7" fill="#F4B6C2"/><circle cx="38" cy="55" r="6" fill="#222"/><circle cx="62" cy="55" r="6" fill="#222"/><ellipse cx="50" cy="68" rx="7" ry="5" fill="#444"/></svg>`,
  // 소
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="36" ry="30" fill="#C9925A"/><ellipse cx="22" cy="34" rx="11" ry="14" fill="#C9925A"/><ellipse cx="78" cy="34" rx="11" ry="14" fill="#C9925A"/><path d="M30 28 Q20 8 12 18" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M70 28 Q80 8 88 18" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/><ellipse cx="50" cy="68" rx="20" ry="14" fill="#F3E2C7"/><circle cx="38" cy="56" r="6" fill="#222"/><circle cx="62" cy="56" r="6" fill="#222"/><circle cx="42" cy="70" r="3" fill="#8a5a33"/><circle cx="58" cy="70" r="3" fill="#8a5a33"/></svg>`,
  // 호랑이
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="36" ry="30" fill="#F0954B"/><circle cx="22" cy="26" r="13" fill="#F0954B"/><circle cx="78" cy="26" r="13" fill="#F0954B"/><circle cx="22" cy="26" r="6" fill="#FFE0C0"/><circle cx="78" cy="26" r="6" fill="#FFE0C0"/><path d="M28 42 Q34 36 40 42" stroke="#222" stroke-width="4" fill="none"/><path d="M60 42 Q66 36 72 42" stroke="#222" stroke-width="4" fill="none"/><path d="M20 58 Q30 54 36 58" stroke="#222" stroke-width="4" fill="none"/><path d="M64 58 Q70 54 80 58" stroke="#222" stroke-width="4" fill="none"/><ellipse cx="50" cy="68" rx="18" ry="13" fill="#FFE9D6"/><circle cx="38" cy="56" r="6" fill="#222"/><circle cx="62" cy="56" r="6" fill="#222"/><path d="M46 70 Q50 74 54 70" stroke="#222" stroke-width="3" fill="none"/></svg>`,
  // 토끼
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="64" rx="32" ry="26" fill="#FBEFEC"/><ellipse cx="28" cy="20" rx="9" ry="26" fill="#FBEFEC" stroke="#E8C7D0" stroke-width="2"/><ellipse cx="72" cy="20" rx="9" ry="26" fill="#FBEFEC" stroke="#E8C7D0" stroke-width="2"/><ellipse cx="28" cy="20" rx="4" ry="18" fill="#F4B6C2"/><ellipse cx="72" cy="20" rx="4" ry="18" fill="#F4B6C2"/><circle cx="38" cy="60" r="6" fill="#222"/><circle cx="62" cy="60" r="6" fill="#222"/><ellipse cx="50" cy="72" rx="5" ry="4" fill="#F4B6C2"/><circle cx="30" cy="68" r="5" fill="#FAD2D8" opacity=".8"/><circle cx="70" cy="68" r="5" fill="#FAD2D8" opacity=".8"/></svg>`,
  // 용
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="36" ry="28" fill="#4CAF7D"/><path d="M30 26 L20 6 L34 18Z" fill="#357A5B"/><path d="M70 26 L80 6 L66 18Z" fill="#357A5B"/><ellipse cx="50" cy="70" rx="20" ry="13" fill="#DFF3E6"/><circle cx="38" cy="54" r="6" fill="#222"/><circle cx="62" cy="54" r="6" fill="#222"/><path d="M40 72 Q50 80 60 72" stroke="#222" stroke-width="3" fill="none"/><path d="M16 50 Q8 56 14 64" stroke="#357A5B" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M84 50 Q92 56 86 64" stroke="#357A5B" stroke-width="5" fill="none" stroke-linecap="round"/></svg>`,
  // 뱀
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="34" ry="28" fill="#6FBF6A"/><path d="M50 88 Q30 78 38 64 Q44 54 32 48" stroke="#6FBF6A" stroke-width="14" fill="none" stroke-linecap="round"/><circle cx="38" cy="52" r="6" fill="#222"/><circle cx="62" cy="52" r="6" fill="#222"/><path d="M44 68 L50 78 L56 68" stroke="#A2322E" stroke-width="3" fill="none"/><ellipse cx="34" cy="44" rx="4" ry="6" fill="#fff" opacity=".5"/></svg>`,
  // 말
  `<svg viewBox="0 0 100 100"><ellipse cx="52" cy="62" rx="30" ry="32" fill="#9C6B40"/><path d="M30 14 Q50 -2 64 20 Q72 8 76 22 Q70 30 62 28" fill="#6E4A29"/><ellipse cx="52" cy="78" rx="16" ry="14" fill="#D9B58C"/><circle cx="40" cy="58" r="6" fill="#222"/><circle cx="64" cy="58" r="6" fill="#222"/><circle cx="46" cy="84" r="3" fill="#6E4A29"/><circle cx="58" cy="84" r="3" fill="#6E4A29"/></svg>`,
  // 양
  `<svg viewBox="0 0 100 100"><circle cx="26" cy="48" r="12" fill="#F5F1E6"/><circle cx="20" cy="60" r="11" fill="#F5F1E6"/><circle cx="74" cy="48" r="12" fill="#F5F1E6"/><circle cx="80" cy="60" r="11" fill="#F5F1E6"/><circle cx="34" cy="36" r="12" fill="#F5F1E6"/><circle cx="66" cy="36" r="12" fill="#F5F1E6"/><circle cx="50" cy="30" r="13" fill="#F5F1E6"/><ellipse cx="50" cy="62" rx="28" ry="24" fill="#F5F1E6"/><ellipse cx="50" cy="68" rx="16" ry="12" fill="#5A4632"/><circle cx="40" cy="58" r="5" fill="#222"/><circle cx="60" cy="58" r="5" fill="#222"/></svg>`,
  // 원숭이
  `<svg viewBox="0 0 100 100"><circle cx="18" cy="50" r="14" fill="#8A5A36"/><circle cx="82" cy="50" r="14" fill="#8A5A36"/><ellipse cx="50" cy="58" rx="34" ry="28" fill="#8A5A36"/><ellipse cx="50" cy="64" rx="20" ry="20" fill="#D9B58C"/><circle cx="40" cy="56" r="6" fill="#222"/><circle cx="60" cy="56" r="6" fill="#222"/><ellipse cx="50" cy="72" rx="6" ry="4" fill="#5A4632"/></svg>`,
  // 닭
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="64" rx="30" ry="26" fill="#F4F1E8"/><path d="M34 24 Q38 8 46 24 Q50 10 54 24 Q62 10 66 24 Q60 32 50 30 Q40 32 34 24Z" fill="#E2433B"/><path d="M50 56 L62 64 L50 68Z" fill="#F2A93C"/><circle cx="40" cy="56" r="5" fill="#222"/><circle cx="60" cy="56" r="5" fill="#222"/><ellipse cx="24" cy="68" rx="7" ry="9" fill="#E2433B"/></svg>`,
  // 개
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="34" ry="28" fill="#D9A55E"/><path d="M18 30 Q6 50 22 64 Q24 44 30 36Z" fill="#B5793A"/><path d="M82 30 Q94 50 78 64 Q76 44 70 36Z" fill="#B5793A"/><ellipse cx="50" cy="70" rx="18" ry="13" fill="#F3E4C8"/><circle cx="38" cy="56" r="6" fill="#222"/><circle cx="62" cy="56" r="6" fill="#222"/><ellipse cx="50" cy="68" rx="5" ry="4" fill="#3a3a3a"/></svg>`,
  // 돼지
  `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="34" ry="28" fill="#F4B7C3"/><circle cx="22" cy="30" r="10" fill="#F4B7C3"/><circle cx="78" cy="30" r="10" fill="#F4B7C3"/><ellipse cx="50" cy="68" rx="16" ry="12" fill="#E893A4"/><circle cx="44" cy="68" r="3" fill="#a85064"/><circle cx="56" cy="68" r="3" fill="#a85064"/><circle cx="38" cy="54" r="6" fill="#222"/><circle cx="62" cy="54" r="6" fill="#222"/></svg>`
];
const animalGrid = document.getElementById('animalGrid');
const nicknameInput = document.getElementById('nickname');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const preview = document.getElementById('preview');
const previewAvatar = document.getElementById('previewAvatar');
const previewName = document.getElementById('previewName');

let selectedAnimal = null;

ANIMALS.forEach((animal, idx)=>{
  const btn = document.createElement('button');
  btn.className = 'animal-btn';
  btn.innerHTML = animal + `<span class="animal-name">${ANIMAL_NAMES[idx]}</span>`;
  btn.title = ANIMAL_NAMES[idx];
  btn.onclick = ()=>{
    selectedAnimal = animal;
    document.querySelectorAll('.animal-btn').forEach(b=> b.classList.remove('selected'));
    btn.classList.add('selected');
    updatePreview();
    validate();
  };
  animalGrid.appendChild(btn);
});

function updatePreview(){
  const name = nicknameInput.value.trim();
  if(selectedAnimal && name){
    previewAvatar.innerHTML = selectedAnimal;
    previewName.textContent = name;
    preview.style.display = 'flex';
  } else {
    preview.style.display = 'none';
  }
}

function validate(){
  const name = nicknameInput.value.trim();
  submitBtn.disabled = !(selectedAnimal && name.length > 0);
}

nicknameInput.addEventListener('input', ()=>{
  updatePreview();
  validate();
});

submitBtn.onclick = ()=>{
  const name = nicknameInput.value.trim();
  if(!selectedAnimal){
    errorMsg.textContent = '동물 캐릭터를 선택해 주세요.';
    return;
  }
  if(!name){
    errorMsg.textContent = '닉네임을 입력해 주세요.';
    return;
  }
  errorMsg.textContent = '';
  localStorage.setItem('user-profile', JSON.stringify({avatar: selectedAnimal, nickname: name}));
  window.location.href = 'learn.html';
};

(function init(){
  try{
    const saved = JSON.parse(localStorage.getItem('user-profile'));
    if(saved){
      nicknameInput.value = saved.nickname || '';
      if(saved.avatar){
        selectedAnimal = saved.avatar;
        const idx = ANIMALS.indexOf(saved.avatar);
        if(idx >= 0) animalGrid.children[idx].classList.add('selected');
      }
      updatePreview();
      validate();
    }
  }catch(e){}
})();

const themeToggle = document.getElementById('themeToggle');
function updateThemeIcon(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  themeToggle.textContent = isDark ? '☀️' : '🌙';
}
themeToggle.onclick = ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('theme', next); }catch(e){}
  updateThemeIcon();
};
updateThemeIcon();
</script>
</body>
</html>
